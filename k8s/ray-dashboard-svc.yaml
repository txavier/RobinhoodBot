apiVersion: v1
kind: Service
metadata:
  name: ray-dashboard
  namespace: robinhoodbot
  labels:
    app: robinhoodbot-optimizer
spec:
  type: NodePort
  selector:
    app: robinhoodbot-optimizer
    ray-role: head
  ports:
    - name: dashboard
      port: 8265
      targetPort: 8265
      nodePort: 30265
