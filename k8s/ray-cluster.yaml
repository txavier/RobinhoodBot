apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: optimizer-ray
  namespace: robinhoodbot
  labels:
    app: robinhoodbot-optimizer
spec:
  rayVersion: "2.54.0"
  enableInTreeAutoscaling: true

  headGroupSpec:
    rayStartParams:
      dashboard-host: "0.0.0.0"
      metrics-export-port: "8080"
      num-cpus: "0"            # Head does coordination only, no work
      disable-usage-stats: "true"
    template:
      metadata:
        labels:
          app: robinhoodbot-optimizer
          ray-role: head
      spec:
        tolerations:
          - key: "node.kubernetes.io/not-ready"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 30
          - key: "node.kubernetes.io/unreachable"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 30
        containers:
          - name: ray-head
            image: 192.168.87.35:5000/robinhoodbot:latest
            imagePullPolicy: Always
            ports:
              - containerPort: 6379    # GCS
                name: gcs
              - containerPort: 8265    # Dashboard
                name: dashboard
              - containerPort: 10001   # Client
                name: client
              - containerPort: 8080    # Prometheus metrics
                name: metrics
            env:
              - name: TZ
                value: "America/New_York"
              - name: PYTHONUNBUFFERED
                value: "1"
              - name: RAY_DISABLE_MEMORY_MONITOR
                value: "1"
              - name: RAY_SCHEDULER_EVENTS
                value: "0"
              - name: RAY_AUTOSCALER_LOG_LEVEL
                value: "WARNING"
            volumeMounts:
              - name: config
                mountPath: /app/config.py
                subPath: config.py
                readOnly: true
              - name: data
                mountPath: /app/data
              - name: data
                mountPath: /app/.yfinance_cache
                subPath: .yfinance_cache
              - name: dshm
                mountPath: /dev/shm
            resources:
              requests:
                cpu: "1"
                memory: "1Gi"
              limits:
                cpu: "2"
                memory: "2Gi"
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 512Mi
          - name: config
            secret:
              secretName: robinhoodbot-config
          - name: data
            persistentVolumeClaim:
              claimName: robinhoodbot-data-nfs

  workerGroupSpecs:
    - groupName: workers
      replicas: 4
      minReplicas: 4
      maxReplicas: 10
      rayStartParams:
        num-cpus: "7"
        metrics-export-port: "8080"
      template:
        metadata:
          labels:
            app: robinhoodbot-optimizer
            ray-role: worker
        spec:
          tolerations:
            - key: "node.kubernetes.io/not-ready"
              operator: "Exists"
              effect: "NoExecute"
              tolerationSeconds: 30
            - key: "node.kubernetes.io/unreachable"
              operator: "Exists"
              effect: "NoExecute"
              tolerationSeconds: 30
          containers:
            - name: ray-worker
              image: 192.168.87.35:5000/robinhoodbot:latest
              imagePullPolicy: Always
              ports:
                - containerPort: 8080
                  name: metrics
              env:
                - name: TZ
                  value: "America/New_York"
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: RAY_DISABLE_MEMORY_MONITOR
                  value: "1"
              volumeMounts:
                - name: config
                  mountPath: /app/config.py
                  subPath: config.py
                  readOnly: true
                - name: dshm
                  mountPath: /dev/shm
              resources:
                requests:
                  cpu: "6"
                  memory: "4Gi"
                limits:
                  cpu: "8"
                  memory: "8Gi"
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 4Gi
            - name: config
              secret:
                secretName: robinhoodbot-config
          # Spread workers across nodes
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: ray-role
                          operator: In
                          values: ["worker"]
                    topologyKey: kubernetes.io/hostname
