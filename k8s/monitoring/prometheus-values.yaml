# ============================================================================
# Prometheus + Grafana values for Ray monitoring
# ============================================================================
# Overrides for kube-prometheus-stack Helm chart
# Reference: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# IMPORTANT: No PII, credentials, or email addresses in this file.
# SMTP credentials are stored in K8s secret 'alertmanager-smtp-secret'
# in the monitoring namespace (see secrets.env for setup).
# Alertmanager config is applied directly via its K8s secret, not here.

grafana:
  # Set a known admin password (avoids mismatch after reinstall with persistent storage)
  adminPassword: prom-operator
  # Expose Grafana on a NodePort so it's accessible from the LAN
  service:
    type: NodePort
    nodePort: 30080
  # Allow embedding Grafana panels in Ray Dashboard
  grafana.ini:
    security:
      allow_embedding: true
    auth.anonymous:
      enabled: true
      org_role: Viewer
    smtp:
      enabled: true
      host: smtp.gmail.com:587
      # Credentials loaded from grafana-smtp-secret via env vars below
  envFromSecrets:
    - name: grafana-smtp-secret
      optional: false
  # Use the chart's built-in init-chown-data with DAC_OVERRIDE + FOWNER added so
  # it can traverse 0700 dirs Grafana creates (which caused failures with only
  # CHOWN cap after kured reboots).
  initChownData:
    enabled: true
    image:
      repository: busybox
      tag: latest
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      capabilities:
        add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  podSecurityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  # Persist Grafana data on Longhorn so it survives node wipes/drains
  persistence:
    enabled: true
    storageClassName: longhorn
    accessModes: ["ReadWriteOnce"]
    size: 1Gi
  # Sidecar watches for ConfigMaps with label grafana_dashboard=1
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: grafana_folder
      # Use WATCH method so the sidecar continuously monitors for new/changed
      # ConfigMaps instead of only scanning once at startup. This prevents
      # dashboards from being missed if the initial list-sync is incomplete
      # (e.g. due to API server slowness during cluster bootstrap).
      watchMethod: WATCH
      provider:
        foldersFromFilesStructure: true
    resources:
      requests:
        cpu: 10m
        memory: 48Mi
      limits:
        memory: 128Mi

# Ensure node-exporter collects hardware temperature sensors
prometheus-node-exporter:
  extraArgs:
    - --collector.hwmon
    - --collector.thermal_zone

prometheus:
  prometheusSpec:
    # Discover PodMonitors in all namespaces
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    # Discover ServiceMonitors in all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    # Discover PrometheusRules in all namespaces
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    # Resource requests/limits — prevents starvation on busy nodes
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 3Gi
    # Retention
    retention: 30d
    # Storage — use Longhorn so data survives node wipes/drains
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
