# ============================================================================
# PodMonitor — Scrape Ray metrics from all Ray nodes (head + workers)
# ============================================================================
# Ray exports Prometheus metrics on port 8080 (named "metrics") by default.
# This PodMonitor tells Prometheus to scrape metrics from every Ray pod
# in the robinhoodbot namespace.
# ============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ray-pod-monitor
  namespace: robinhoodbot
spec:
  jobLabel: ray.io/cluster
  selector:
    matchLabels:
      ray.io/is-ray-node: "yes"
  podMetricsEndpoints:
    - port: metrics
      interval: 15s
      path: /metrics
