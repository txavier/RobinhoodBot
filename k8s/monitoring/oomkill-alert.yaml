apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: robinhoodbot-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: kube-prometheus-stack
spec:
  groups:
    - name: robinhoodbot.alerts
      rules:
        # OOMKill - container killed due to memory limit
        - alert: RobinhoodBotOOMKilled
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="robinhoodbot", container="bot"}[5m]) > 0
            and on(namespace, pod)
            kube_pod_container_status_last_terminated_reason{namespace="robinhoodbot", container="bot", reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: critical
            app: robinhoodbot
          annotations:
            summary: "RobinhoodBot OOMKilled"
            description: "The robinhoodbot container was OOMKilled and restarted. Pod {{ $labels.pod }} on node {{ $labels.node }}."

        # CrashLoopBackOff - container repeatedly crashing
        - alert: RobinhoodBotCrashLooping
          expr: |
            kube_pod_container_status_waiting_reason{namespace="robinhoodbot", container="bot", reason="CrashLoopBackOff"} == 1
          for: 2m
          labels:
            severity: critical
            app: robinhoodbot
          annotations:
            summary: "RobinhoodBot CrashLoopBackOff"
            description: "The robinhoodbot container is in CrashLoopBackOff. Pod {{ $labels.pod }}."

        # Any restart regardless of reason
        - alert: RobinhoodBotRestarted
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="robinhoodbot", container="bot"}[5m]) > 0
            unless on(namespace, pod)
            kube_pod_container_status_last_terminated_reason{namespace="robinhoodbot", container="bot", reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
            app: robinhoodbot
          annotations:
            summary: "RobinhoodBot Restarted"
            description: "The robinhoodbot container restarted (non-OOM). Pod {{ $labels.pod }}. Reason: {{ $labels.reason }}."

        # Pod not ready for 5 minutes
        - alert: RobinhoodBotNotReady
          expr: |
            kube_pod_status_ready{namespace="robinhoodbot", condition="true"} == 0
            and on(namespace, pod)
            kube_pod_labels{namespace="robinhoodbot", label_app="robinhoodbot"}
          for: 5m
          labels:
            severity: warning
            app: robinhoodbot
          annotations:
            summary: "RobinhoodBot Pod Not Ready"
            description: "The robinhoodbot pod {{ $labels.pod }} has been not ready for more than 5 minutes."

        # No running bot pod at all
        - alert: RobinhoodBotDown
          expr: |
            absent(kube_pod_status_phase{namespace="robinhoodbot", phase="Running"}
            * on(namespace, pod) kube_pod_labels{namespace="robinhoodbot", label_app="robinhoodbot"})
          for: 5m
          labels:
            severity: critical
            app: robinhoodbot
          annotations:
            summary: "RobinhoodBot Down"
            description: "No running robinhoodbot pod detected for more than 5 minutes."
