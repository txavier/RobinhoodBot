# Kured (KUbernetes REboot Daemon) Helm values
# ----------------------------------------------
# Watches for /var/run/reboot-required on each node (created by
# Ubuntu's unattended-upgrades after kernel/security updates).
# Cordons, drains, and reboots one node at a time during the
# configured maintenance window.
#
# Docs: https://kured.dev/docs/

configuration:
  # Only reboot during overnight hours to minimize disruption
  # 00:00-02:00 Eastern (America/New_York handles DST automatically)
  startTime: "00:00"
  endTime: "02:00"
  # Time zone for the reboot window
  timeZone: "America/New_York"
  # Period between checks for reboot-required sentinel
  period: "1h"
  # Prometheus alert to block reboots when firing (safety: don't reboot
  # while something else is already broken)
  blockingPodAnnotation: ""
  # Log to stdout
  logFormat: "text"
  # Notify via Slack/webhook (optional, we use Alertmanager instead)
  # slackHookUrl: ""
  # Annotate nodes when kured reboots them (for audit trail)
  annotateNodes: true

# Tolerate all taints so kured runs on every node including NotReady
tolerations:
  - operator: "Exists"

# Metrics for Prometheus
metrics:
  create: true
  labels: {}

# Resource limits (kured is very lightweight)
resources:
  requests:
    cpu: 1m
    memory: 16Mi
  limits:
    cpu: 50m
    memory: 48Mi
