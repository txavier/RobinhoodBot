# Network Watchdog DaemonSet
# --------------------------
# Runs on all worker nodes. Every 2 minutes, pings the gateway (192.168.87.1)
# or control plane (192.168.87.35). After 30 consecutive failures (~1 hour),
# reboots the node via nsenter. 2-hour cooldown prevents reboot loops.
# Tolerates NotReady/Unreachable taints so it stays on troubled nodes.
# Requires hostPID + privileged to access the host's /sbin/reboot.
# Footprint: 1m CPU, 8Mi memory per node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-network-watchdog
  namespace: kube-system
  labels:
    app: node-network-watchdog
spec:
  selector:
    matchLabels:
      app: node-network-watchdog
  template:
    metadata:
      labels:
        app: node-network-watchdog
    spec:
      hostPID: true
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: watchdog
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              GATEWAY="192.168.87.1"
              CONTROL_PLANE="192.168.87.35"
              CHECK_INTERVAL=120        # check every 2 minutes
              MAX_FAILURES=30           # 30 consecutive failures = ~1 hour
              REBOOT_COOLDOWN=7200      # don't reboot more than once per 2 hours

              fail_count=0
              last_reboot=0

              log() { echo "$(date '+%Y-%m-%d %H:%M:%S') [watchdog] $1"; }

              log "Starting network watchdog on $(hostname)"
              log "Targets: gateway=$GATEWAY control-plane=$CONTROL_PLANE"
              log "Will reboot after $MAX_FAILURES consecutive failures (~$((MAX_FAILURES * CHECK_INTERVAL / 60)) min)"

              while true; do
                if ping -c 2 -W 5 "$GATEWAY" >/dev/null 2>&1 || ping -c 2 -W 5 "$CONTROL_PLANE" >/dev/null 2>&1; then
                  if [ "$fail_count" -gt 0 ]; then
                    log "Network recovered after $fail_count consecutive failures"
                  fi
                  fail_count=0
                else
                  fail_count=$((fail_count + 1))
                  log "Network unreachable (failure $fail_count/$MAX_FAILURES)"

                  if [ "$fail_count" -ge "$MAX_FAILURES" ]; then
                    now=$(date +%s)
                    elapsed=$((now - last_reboot))
                    if [ "$elapsed" -ge "$REBOOT_COOLDOWN" ]; then
                      log "REBOOTING NODE - network unreachable for $((fail_count * CHECK_INTERVAL / 60)) minutes"
                      last_reboot=$now
                      nsenter -t 1 -m -u -i -n -- /sbin/reboot
                    else
                      log "Reboot needed but cooldown active (${elapsed}s/${REBOOT_COOLDOWN}s since last reboot)"
                    fi
                  fi
                fi
                sleep "$CHECK_INTERVAL"
              done
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
