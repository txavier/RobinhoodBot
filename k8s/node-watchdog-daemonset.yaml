# Network Watchdog DaemonSet
# --------------------------
# Runs on all worker nodes. Every 2 minutes, pings the gateway (192.168.87.1)
# or control plane (192.168.87.35). After 30 consecutive failures (~1 hour),
# reboots the node via nsenter. 2-hour cooldown prevents reboot loops.
# Tolerates NotReady/Unreachable taints so it stays on troubled nodes.
# Requires hostPID + privileged to access the host's /sbin/reboot.
# Sends an alert to Alertmanager (-> Gmail) before rebooting.
# Footprint: 1m CPU, 8Mi memory per node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-network-watchdog
  namespace: kube-system
  labels:
    app: node-network-watchdog
spec:
  selector:
    matchLabels:
      app: node-network-watchdog
  template:
    metadata:
      labels:
        app: node-network-watchdog
    spec:
      hostPID: true
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: watchdog
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              GATEWAY="192.168.87.1"
              CONTROL_PLANE="192.168.87.35"
              ALERTMANAGER="kube-prometheus-stack-alertmanager.monitoring:9093"
              CHECK_INTERVAL=120        # check every 2 minutes
              MAX_FAILURES=30           # 30 consecutive failures = ~1 hour
              REBOOT_COOLDOWN=7200      # don't reboot more than once per 2 hours
              REBOOT_FLAG="/host-tmp/watchdog-rebooted"

              fail_count=0
              last_reboot=0

              log() { echo "$(date '+%Y-%m-%d %H:%M:%S') [watchdog] $1"; }

              # Send alert to Alertmanager (best-effort, don't fail if unreachable)
              send_alert() {
                severity="$1"
                summary="$2"
                description="$3"
                node=$(cat /etc/hostname 2>/dev/null || echo "unknown")
                # busybox wget with POST body via stdin
                printf '[{"labels":{"alertname":"NodeWatchdogReboot","severity":"%s","node":"%s","namespace":"kube-system"},"annotations":{"summary":"%s","description":"%s"},"generatorURL":"http://node-watchdog"}]' \
                  "$severity" "$node" "$summary" "$description" | \
                  wget -q -O /dev/null --post-data="$(cat)" "http://${ALERTMANAGER}/api/v2/alerts" 2>/dev/null || true
              }

              log "Starting network watchdog on $(hostname)"
              log "Targets: gateway=$GATEWAY control-plane=$CONTROL_PLANE"
              log "Will reboot after $MAX_FAILURES consecutive failures (~$((MAX_FAILURES * CHECK_INTERVAL / 60)) min)"

              # Check if this is a post-reboot startup (uptime < 10 min + flag file exists)
              uptime_seconds=$(cut -d. -f1 /proc/uptime)
              if [ "$uptime_seconds" -lt 600 ] && [ -f "$REBOOT_FLAG" ]; then
                log "POST-REBOOT: Node was rebooted by watchdog (uptime=${uptime_seconds}s)"
                rm -f "$REBOOT_FLAG"
                # Wait for network to come up before sending alert
                for i in $(seq 1 30); do
                  if ping -c 1 -W 3 "$CONTROL_PLANE" >/dev/null 2>&1; then
                    send_alert "warning" "Node watchdog rebooted node" "Node $(cat /etc/hostname) was automatically rebooted by network watchdog after ~1 hour of network unreachability. Node is now back online."
                    log "POST-REBOOT: Alert sent to Alertmanager"
                    break
                  fi
                  sleep 10
                done
              fi

              while true; do
                if ping -c 2 -W 5 "$GATEWAY" >/dev/null 2>&1 || ping -c 2 -W 5 "$CONTROL_PLANE" >/dev/null 2>&1; then
                  if [ "$fail_count" -gt 0 ]; then
                    log "Network recovered after $fail_count consecutive failures"
                  fi
                  fail_count=0
                else
                  fail_count=$((fail_count + 1))
                  log "Network unreachable (failure $fail_count/$MAX_FAILURES)"

                  if [ "$fail_count" -ge "$MAX_FAILURES" ]; then
                    now=$(date +%s)
                    elapsed=$((now - last_reboot))
                    if [ "$elapsed" -ge "$REBOOT_COOLDOWN" ]; then
                      log "REBOOTING NODE - network unreachable for $((fail_count * CHECK_INTERVAL / 60)) minutes"
                      # Write flag to host filesystem so it persists across reboot
                      echo "$(date +%s)" > "$REBOOT_FLAG"
                      last_reboot=$now
                      nsenter -t 1 -m -u -i -n -- /sbin/reboot
                    else
                      log "Reboot needed but cooldown active (${elapsed}s/${REBOOT_COOLDOWN}s since last reboot)"
                    fi
                  fi
                fi
                sleep "$CHECK_INTERVAL"
              done
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-tmp
              mountPath: /host-tmp
            - name: host-hostname
              mountPath: /etc/hostname
              readOnly: true
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: host-tmp
          hostPath:
            path: /var/tmp
            type: DirectoryOrCreate
        - name: host-hostname
          hostPath:
            path: /etc/hostname
            type: File
