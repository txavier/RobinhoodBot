# ============================================================================
# Garage S3 Credentials
# ============================================================================
# Contains the RPC secret (for Garage internal comms), admin token,
# and S3 API credentials that are pre-generated so they can be referenced
# by both Garage (via key import) and the bot/optimizer pods.
#
# IMPORTANT: Replace the placeholder values before applying!
#   Generate secrets:
#     RPC_SECRET:        openssl rand -hex 32
#     ADMIN_TOKEN:       openssl rand -base64 32
#     ACCESS_KEY_ID:     use format GKxxxxxxxxxxxxxxxx (openssl rand -hex 10)
#     SECRET_ACCESS_KEY: openssl rand -base64 32
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: garage-s3
  namespace: robinhoodbot
type: Opaque
stringData:
  rpc-secret: "CHANGE_ME_RPC_SECRET_HEX_64_CHARS"
  admin-token: "CHANGE_ME_ADMIN_TOKEN"
  access-key-id: "GK_CHANGE_ME"
  secret-access-key: "CHANGE_ME_SECRET_KEY"
