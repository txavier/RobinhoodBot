# ============================================================================
# Garage S3 — Service
# ============================================================================
# Exposes Garage's S3 API (3900), RPC (3901), web (3902), and admin (3903)
# within the cluster. The S3 endpoint for boto3 clients is:
#   http://garage.robinhoodbot.svc.cluster.local:3900
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: robinhoodbot
  labels:
    app: garage
spec:
  type: ClusterIP
  selector:
    app: garage
  ports:
    - name: s3-api
      port: 3900
      targetPort: 3900
    - name: rpc
      port: 3901
      targetPort: 3901
    - name: web
      port: 3902
      targetPort: 3902
    - name: admin
      port: 3903
      targetPort: 3903
