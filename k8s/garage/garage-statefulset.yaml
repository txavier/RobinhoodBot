# ============================================================================
# Garage S3 — StatefulSet
# ============================================================================
# Single-replica Garage instance providing S3-compatible object storage.
# An init container templates the TOML config with secrets (RPC secret,
# admin token) before Garage starts.
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: robinhoodbot
  labels:
    app: garage
spec:
  replicas: 1
  serviceName: garage
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      initContainers:
        # Template the TOML config with secrets — Garage doesn't support env
        # var interpolation natively, so we do a simple sed replacement.
        - name: render-config
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              sed \
                -e "s|\${GARAGE_RPC_SECRET}|${GARAGE_RPC_SECRET}|g" \
                -e "s|\${GARAGE_ADMIN_TOKEN}|${GARAGE_ADMIN_TOKEN}|g" \
                /etc/garage-template/garage.toml > /etc/garage/garage.toml
              cat /etc/garage/garage.toml
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: garage-s3
                  key: rpc-secret
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-s3
                  key: admin-token
          volumeMounts:
            - name: config-template
              mountPath: /etc/garage-template
            - name: config-rendered
              mountPath: /etc/garage
      containers:
        - name: garage
          image: dxflrs/garage:v1.0.1
          ports:
            - containerPort: 3900
              name: s3-api
            - containerPort: 3901
              name: rpc
            - containerPort: 3902
              name: web
            - containerPort: 3903
              name: admin
          env:
            - name: GARAGE_CONFIG_FILE
              value: "/etc/garage/garage.toml"
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/garage
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3903
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3903
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config-template
          configMap:
            name: garage-config
        - name: config-rendered
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: garage-data
