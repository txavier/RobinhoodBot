# ============================================================================
# Garage S3 — Configuration (TOML)
# ============================================================================
# Single-node Garage deployment for intra-cluster S3 object storage.
# Replaces NFS-based file sharing between the bot and optimizer pods.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: robinhoodbot
data:
  garage.toml: |
    metadata_dir = "/data/meta"
    data_dir = "/data/blocks"

    db_engine = "sqlite"
    metadata_auto_snapshot_interval = "6h"

    replication_factor = 1
    compression_level = 1

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"

    [s3_web]
    bind_addr = "[::]:3902"

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token = "${GARAGE_ADMIN_TOKEN}"

    [rpc]
    bind_addr = "[::]:3901"
    secret = "${GARAGE_RPC_SECRET}"
