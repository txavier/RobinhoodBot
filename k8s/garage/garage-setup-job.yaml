# ============================================================================
# Garage S3 — One-time Setup Job
# ============================================================================
# Runs after Garage is deployed to:
#   1. Assign storage layout to the Garage node
#   2. Apply the layout
#   3. Import the pre-generated API key
#   4. Create the 'robinhoodbot' bucket
#   5. Grant the API key read/write/owner access
#
# Safe to re-run — all operations are idempotent.
# ============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: garage-setup
  namespace: robinhoodbot
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: alpine:3.19
          env:
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-s3
                  key: admin-token
            - name: ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-s3
                  key: access-key-id
            - name: SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-s3
                  key: secret-access-key
          command: ["/bin/sh", "-exc"]
          args:
            - |
              apk add --no-cache curl jq >/dev/null

              ADMIN="http://garage.robinhoodbot.svc.cluster.local:3903"
              AUTH="Authorization: Bearer $GARAGE_ADMIN_TOKEN"

              echo "=== Waiting for Garage admin API ==="
              until curl -sf "$ADMIN/health" 2>/dev/null; do
                echo "  waiting..."; sleep 3
              done
              echo ""

              echo "=== Getting node ID ==="
              NODE_ID=$(curl -sf -H "$AUTH" "$ADMIN/v1/status" | jq -r '.node')
              echo "  Node: $NODE_ID"

              echo "=== Assigning layout (1 GB, zone dc1) ==="
              curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
                -d "[{\"id\":\"$NODE_ID\",\"zone\":\"dc1\",\"capacity\":1073741824,\"tags\":[]}]" \
                "$ADMIN/v1/layout" || echo "  (may already be assigned)"

              echo "=== Applying layout ==="
              LAYOUT_VER=$(curl -sf -H "$AUTH" "$ADMIN/v1/layout" | jq '.version')
              NEXT_VER=$((LAYOUT_VER + 1))
              curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"version\":$NEXT_VER}" \
                "$ADMIN/v1/layout/apply" || echo "  (may already be applied)"

              echo "=== Importing API key ==="
              IMPORT_RESP=$(curl -s -w "\n%{http_code}" -X POST -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"name\":\"robinhoodbot\",\"accessKeyId\":\"$ACCESS_KEY_ID\",\"secretAccessKey\":\"$SECRET_ACCESS_KEY\"}" \
                "$ADMIN/v1/key/import")
              IMPORT_HTTP=$(echo "$IMPORT_RESP" | tail -1)
              IMPORT_BODY=$(echo "$IMPORT_RESP" | sed '$d')
              if [ "$IMPORT_HTTP" -ge 200 ] && [ "$IMPORT_HTTP" -lt 300 ]; then
                echo "  Key imported: $ACCESS_KEY_ID"
              elif echo "$IMPORT_BODY" | grep -q "already exists"; then
                echo "  (key already exists)"
              else
                echo "  ERROR importing key (HTTP $IMPORT_HTTP): $IMPORT_BODY" >&2
                exit 1
              fi

              echo "=== Creating bucket ==="
              curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"globalAlias\":\"robinhoodbot\"}" \
                "$ADMIN/v1/bucket" || echo "  (bucket may already exist)"

              echo "=== Getting bucket ID ==="
              BUCKET_ID=$(curl -sf -H "$AUTH" \
                "$ADMIN/v1/bucket?globalAlias=robinhoodbot" | jq -r '.id')
              echo "  Bucket ID: $BUCKET_ID"

              echo "=== Granting key access ==="
              curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"bucketId\":\"$BUCKET_ID\",\"accessKeyId\":\"$ACCESS_KEY_ID\",\"permissions\":{\"read\":true,\"write\":true,\"owner\":true}}" \
                "$ADMIN/v1/bucket/allow" || echo "  (permissions may already be set)"

              echo ""
              echo "=== Garage setup complete ==="
              echo "  S3 endpoint: http://garage.robinhoodbot.svc.cluster.local:3900"
              echo "  Bucket:      robinhoodbot"
              echo "  Access Key:  $ACCESS_KEY_ID"
