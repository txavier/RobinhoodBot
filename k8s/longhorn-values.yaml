# ============================================================================
# Longhorn distributed storage — values for bare-metal ThinkPad cluster
# ============================================================================
# Reference: https://longhorn.io/docs/1.11.1/references/settings/
# Current version: v1.11.1
#
# These settings are the v1.11.1 defaults EXCEPT where noted with [WiFi override].
# To customize for this cluster, add settings below and document each deviation.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Storage defaults (all v1.11.1 defaults)
# ---------------------------------------------------------------------------
defaultSettings:
  # v1.11.1 default: 3 replicas — set to 1 for single-node-survivable WiFi cluster
  # Critical namespaces (robinhoodbot, garage) use longhorn-redundant SC (2 replicas)
  defaultReplicaCount: 1
  # Data path on root FS (no raw disks available)
  defaultDataPath: /var/lib/longhorn
  # v1.11.1 default: 25%
  storageMinimalAvailablePercentage: 25
  # v1.11.1 default: 100%
  storageOverProvisioningPercentage: 100
  # v1.11.1 default: do-nothing
  nodeDownPodDeletionPolicy: do-nothing
  # [WiFi override] Keep at 1 to avoid saturating WiFi during rebuilds.
  # v1.11.1 default is 5.
  concurrentReplicaRebuildPerNodeLimit: 1
  # [WiFi override] Keep at 30s to tolerate flaky WiFi latency spikes.
  # v1.11.1 default is 8s. Setting to 8s causes false detachments on WiFi.
  engineReplicaTimeout: 30
  # v1.11.1 default: disabled
  replicaAutoBalance: "disabled"
  # v1.11.1 default: false
  replicaSoftAntiAffinity: false
  # v1.11.1 default: 600s
  replicaReplenishmentWaitInterval: 600
  # v1.11.1 default: true
  autoSalvage: true
  # v1.11.1 default: true
  autoDeletePodWhenVolumeDetachedUnexpectedly: true
  # v1.11.1 default: false
  rwxVolumeFastFailover: false

# ---------------------------------------------------------------------------
# Longhorn Manager (runs on every node as DaemonSet)
# ---------------------------------------------------------------------------
longhornManager:
  tolerations: []

# ---------------------------------------------------------------------------
# Longhorn UI — expose on NodePort for LAN access
# ---------------------------------------------------------------------------
longhornUI:
  replicas: 1

service:
  ui:
    type: NodePort
    nodePort: 30081

# ---------------------------------------------------------------------------
# Resource limits — keep it lightweight on 8GB nodes
# ---------------------------------------------------------------------------
longhornManager:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

longhornDriver:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# ---------------------------------------------------------------------------
# Don't schedule Longhorn storage on the control plane (4 CPU, 8G RAM,
# already running etcd + API server)
# ---------------------------------------------------------------------------
longhornManager:
  nodeSelector: {}
  tolerations: []

# Exclude control plane from storing data via node tag (applied post-install)
# kubectl -n longhorn-system label node theo-thinkpad-l430 node.longhorn.io/create-default-disk=false

# ---------------------------------------------------------------------------
# Ingress (disabled — using NodePort above)
# ---------------------------------------------------------------------------
ingress:
  enabled: false

# ---------------------------------------------------------------------------
# StorageClass
# ---------------------------------------------------------------------------
persistence:
  defaultClass: false  # Longhorn is opt-in; local-path is default
  defaultClassReplicaCount: 3
  reclaimPolicy: Retain
  removeSnapshotsDuringFilesystemTrim: ignored

# ---------------------------------------------------------------------------
# StorageClass — managed by k8s/longhorn-storageclass.yaml
# ---------------------------------------------------------------------------
# After upgrading Longhorn, re-apply the custom StorageClass:
#   kubectl delete storageclass longhorn
#   kubectl apply -f k8s/longhorn-storageclass.yaml
