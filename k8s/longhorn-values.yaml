# ============================================================================
# Longhorn distributed storage — values for bare-metal ThinkPad cluster
# ============================================================================
# Tuned for: 9 worker nodes, 44G disks, 8GB RAM, WiFi networking
# Reference: https://longhorn.io/docs/1.8.1/references/settings/

# ---------------------------------------------------------------------------
# Storage defaults
# ---------------------------------------------------------------------------
defaultSettings:
  # 3 replicas for better resilience across 9 workers
  defaultReplicaCount: 3
  # Data path on root FS (no raw disks available)
  defaultDataPath: /var/lib/longhorn
  # Reserve 25% of each disk so the OS doesn't run out of space
  storageMinimalAvailablePercentage: 25
  storageOverProvisioningPercentage: 100
  # WiFi-friendly: increase timeouts to avoid false node-down on flaky WiFi
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
  # Reduce replica rebuild concurrency to avoid WiFi saturation
  concurrentReplicaRebuildPerNodeLimit: 1
  # WiFi-tolerant engine↔replica timeout (default 8 is too aggressive for WiFi)
  engineReplicaTimeout: 30
  # Auto-rebalance replicas when nodes come/go
  replicaAutoBalance: "best-effort"
  # Allow replicas on same node as fallback (better than degraded/stuck volumes)
  replicaSoftAntiAffinity: true
  # Faster replica replenishment after failure (default 600 is too slow)
  replicaReplenishmentWaitInterval: 120
  # Auto-salvage replicas after unexpected detach
  autoSalvage: true
  # Auto-delete workload pod when volume detaches unexpectedly.
  # Forces pod restart, clearing stale NFS inode caches that cause
  # persistent Errno 5 / Errno 121 on previously-open files.
  autoDeletePodWhenVolumeDetachedUnexpectedly: true
  # Fast failover for RWX (NFS) volumes — monitors share-manager health
  # via lease and triggers faster recovery on share-manager failure.
  rwxVolumeFastFailover: true
  # Backup target (optional — can be set later to NFS)
  # backupTarget: nfs://192.168.87.35:/srv/nfs/longhorn-backup

# ---------------------------------------------------------------------------
# Longhorn Manager (runs on every node as DaemonSet)
# ---------------------------------------------------------------------------
longhornManager:
  tolerations: []

# ---------------------------------------------------------------------------
# Longhorn UI — expose on NodePort for LAN access
# ---------------------------------------------------------------------------
longhornUI:
  replicas: 1

service:
  ui:
    type: NodePort
    nodePort: 30081

# ---------------------------------------------------------------------------
# Resource limits — keep it lightweight on 8GB nodes
# ---------------------------------------------------------------------------
longhornManager:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

longhornDriver:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# ---------------------------------------------------------------------------
# Don't schedule Longhorn storage on the control plane (4 CPU, 8G RAM,
# already running NFS + etcd + API server)
# ---------------------------------------------------------------------------
longhornManager:
  nodeSelector: {}
  tolerations: []

# Exclude control plane from storing data via node tag (applied post-install)
# kubectl -n longhorn-system label node theo-thinkpad-l430 node.longhorn.io/create-default-disk=false

# ---------------------------------------------------------------------------
# Ingress (disabled — using NodePort above)
# ---------------------------------------------------------------------------
ingress:
  enabled: false

# ---------------------------------------------------------------------------
# StorageClass
# ---------------------------------------------------------------------------
persistence:
  defaultClass: false  # Keep NFS as default; Longhorn is opt-in
  defaultClassReplicaCount: 3
  reclaimPolicy: Retain
  # Disable Helm-managed StorageClass so we can manage it ourselves
  # with custom nfsOptions via k8s/longhorn-storageclass.yaml
  removeSnapshotsDuringFilesystemTrim: ignored

# ---------------------------------------------------------------------------
# NFS mount options for RWX volumes (share-manager)
# ---------------------------------------------------------------------------
# Longhorn's default 'softerr' mount causes immediate Errno 121 when the
# share-manager pod restarts (e.g. during auto-salvage). We use 'soft' with
# short timeouts so operations fail fast and the bot/liveness probe can react.
#
# The StorageClass is managed by k8s/longhorn-storageclass.yaml (not Helm)
# because Helm doesn't expose nfsOptions as a chart value.
#
# After upgrading Longhorn, re-apply the custom StorageClass:
#   kubectl delete storageclass longhorn
#   kubectl apply -f k8s/longhorn-storageclass.yaml
