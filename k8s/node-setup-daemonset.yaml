# Node Setup DaemonSet
# --------------------
# Ensures consistent configuration across all worker nodes:
#   - Pins K8s packages (kubelet, kubeadm, kubectl) via apt preferences
#   - Blacklists kernel + K8s from unattended-upgrades
#   - Disables WiFi power management (rtw88/rtw_8822ce)
#   - Fixes multipathd interference with Longhorn iSCSI volumes (sd* blacklist)
#   - Runs once at startup, then sleeps (re-applies on pod restart)
# For full initial setup, use k8s/node-setup.sh via SSH.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-setup
  namespace: kube-system
  labels:
    app: node-setup
spec:
  selector:
    matchLabels:
      app: node-setup
  template:
    metadata:
      labels:
        app: node-setup
    spec:
      hostPID: true
      tolerations:
        - operator: "Exists"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: setup
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              K8S_VERSION="1.35.3"

              log() { echo "$(date '+%Y-%m-%d %H:%M:%S') [node-setup] $1"; }

              log "Applying node configuration on $(cat /host-etc/hostname)..."

              # 1. Pin K8s packages via apt preferences
              cat > /host-etc/apt/preferences.d/kubernetes-pin <<PINEOF
              # Pin Kubernetes packages — managed by node-setup DaemonSet
              Package: kubelet kubeadm kubectl
              Pin: version ${K8S_VERSION}*
              Pin-Priority: 1001
              PINEOF
              # Remove leading whitespace from heredoc
              sed -i 's/^              //' /host-etc/apt/preferences.d/kubernetes-pin

              # 2. Configure unattended-upgrades blacklist
              cat > /host-etc/apt/apt.conf.d/50unattended-upgrades <<'UUEOF'
              // Unattended-Upgrade configuration — managed by node-setup DaemonSet
              Unattended-Upgrade::Allowed-Origins {
                  "${distro_id}:${distro_codename}-security";
              };
              Unattended-Upgrade::Package-Blacklist {
                  "kubelet";
                  "kubeadm";
                  "kubectl";
                  "linux-image-*";
                  "linux-headers-*";
                  "linux-modules-*";
                  "linux-base";
              };
              Unattended-Upgrade::Automatic-Reboot "false";
              Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
              Unattended-Upgrade::Remove-Unused-Dependencies "true";
              UUEOF
              sed -i 's/^              //' /host-etc/apt/apt.conf.d/50unattended-upgrades

              # 3. Ensure auto-upgrades are enabled
              cat > /host-etc/apt/apt.conf.d/20auto-upgrades <<'AUEOF'
              APT::Periodic::Update-Package-Lists "1";
              APT::Periodic::Unattended-Upgrade "1";
              APT::Periodic::AutocleanInterval "7";
              AUEOF
              sed -i 's/^              //' /host-etc/apt/apt.conf.d/20auto-upgrades

              # 4. Pin K8s packages with apt-mark hold via nsenter
              nsenter -t 1 -m -u -i -n -- apt-mark hold kubelet kubeadm kubectl 2>/dev/null || true

              # 5. Disable WiFi power management (rtw88/rtw_8822ce)
              # Prevents WiFi dropout under heavy network load
              cat > /host-etc/modprobe.d/rtw88-power.conf <<'WIFIEOF'
              # Disable WiFi power saving — managed by node-setup DaemonSet
              # Prevents rtw_8822ce dropouts under load
              options rtw_core rtw_power_mgnt=0 rtw_ips_mode=0
              WIFIEOF
              sed -i 's/^              //' /host-etc/modprobe.d/rtw88-power.conf

              # Apply at runtime (takes effect immediately, modprobe conf is for next boot)
              nsenter -t 1 -m -u -i -n -- sh -c 'iwconfig wlp5s0 power off 2>/dev/null || true'

              # 6. Fix multipathd interference with Longhorn iSCSI volumes
              # multipathd claims sd[x] block devices created by Longhorn, causing mount failures.
              # Blacklist all sd* devices so multipathd ignores them.
              # See: https://longhorn.io/kb/troubleshooting-volume-with-multipath/
              MULTIPATH_CONF=/host-etc/multipath.conf
              BLACKLIST_ENTRY='blacklist {\n    devnode "^sd[a-z0-9]+"\n}'
              if [ ! -f "$MULTIPATH_CONF" ]; then
                printf "# Managed by node-setup DaemonSet\ndefaults {\n    user_friendly_names yes\n}\n${BLACKLIST_ENTRY}\n" > "$MULTIPATH_CONF"
                log "Created /etc/multipath.conf with sd* blacklist"
              elif ! grep -q 'devnode.*\^sd\[a-z0-9\]' "$MULTIPATH_CONF"; then
                if grep -q 'blacklist' "$MULTIPATH_CONF"; then
                  # Insert devnode line inside existing blacklist block
                  sed -i '/^blacklist[[:space:]]*{/a\    devnode "^sd[a-z0-9]+"' "$MULTIPATH_CONF"
                  log "Added sd* blacklist entry to existing blacklist block in /etc/multipath.conf"
                else
                  printf "\n${BLACKLIST_ENTRY}\n" >> "$MULTIPATH_CONF"
                  log "Appended blacklist block to /etc/multipath.conf"
                fi
              else
                log "/etc/multipath.conf already has sd* blacklist — no change needed"
              fi
              nsenter -t 1 -m -u -i -n -- systemctl restart multipathd.service 2>/dev/null || true

              log "Configuration applied (including WiFi power fix and multipathd fix). Sleeping."

              # Sleep forever — DaemonSet stays running for kubectl logs access
              sleep infinity
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-etc
              mountPath: /host-etc
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
            type: Directory
