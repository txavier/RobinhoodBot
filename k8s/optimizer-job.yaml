apiVersion: batch/v1
kind: Job
metadata:
  name: robinhoodbot-optimizer
  namespace: robinhoodbot
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400  # Auto-cleanup after 24h
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: optimizer
          image: robinhoodbot:latest
          imagePullPolicy: IfNotPresent
          command: ["python3", "genetic_optimizer_intraday.py"]
          args:
            - "--num-stocks=250"
            - "--max-positions=10"
            - "--generations=30"
            - "--population=40"
            - "--real-data"
            - "--resume"
            - "--validate-real"
            - "--days=86"
            - "--train-test-split=0.7"
            - "--optimize-filters"
            - "--use-ray"
            - "--output=/app/data/genetic_optimization_intraday_result.json"
            - "--checkpoint-file=/app/data/genetic_optimization_intraday_result.checkpoint.json"
          env:
            - name: TZ
              value: "America/New_York"
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: config
              mountPath: /app/config.py
              subPath: config.py
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: optimizer-cache
              mountPath: /app/.yfinance_cache
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "2Gi"
              cpu: "2000m"
            limits:
              memory: "12Gi"
              cpu: "14000m"
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        - name: config
          secret:
            secretName: robinhoodbot-config
        - name: data
          persistentVolumeClaim:
            claimName: robinhoodbot-data
        - name: optimizer-cache
          persistentVolumeClaim:
            claimName: optimizer-cache
