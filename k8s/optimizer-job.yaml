apiVersion: batch/v1
kind: Job
metadata:
  name: robinhoodbot-optimizer
  namespace: robinhoodbot
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400  # Auto-cleanup after 24h
  template:
    metadata:
      labels:
        app: robinhoodbot-optimizer
    spec:
      restartPolicy: Never
      priorityClassName: robinhoodbot-high
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
      initContainers:
        - name: wait-for-ray
          image: busybox:1.36
          command: ['sh', '-c', 'echo "Waiting for Ray head..."; until nc -z optimizer-ray-head-svc.robinhoodbot.svc.cluster.local 10001; do sleep 5; done; echo "Ray head is ready"']
      containers:
        - name: optimizer
          image: 192.168.87.35:5000/robinhoodbot:latest
          imagePullPolicy: Always
          command: ["python3", "genetic_optimizer_intraday.py"]
          args:
            - "--num-stocks=600"
            - "--max-positions=10"
            - "--generations=50"
            - "--population=56"
            - "--real-data"
            - "--resume"
            - "--validate-real"
            - "--days=365"
            - "--train-test-split=0.7"
            - "--mutation-rate=0.25"
            - "--optimize-filters"
            - "--use-ray"
            # - "--disable-ray-mem-monitor"
            - "--email-notify"
            - "--output=/app/data/genetic_optimization_intraday_result.json"
            - "--checkpoint-file=/app/data/genetic_optimization_intraday_result.checkpoint.json"
            - "--log-file=/app/logs/optimizer_output.log"
          env:
            - name: TZ
              value: "America/New_York"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DATA_DIR
              value: "/app/data"
            - name: RAY_ADDRESS
              value: "ray://optimizer-ray-head-svc.robinhoodbot.svc.cluster.local:10001"
            - name: RAY_gcs_rpc_server_reconnect_timeout_s
              value: "120"
            - name: RAY_grpc_client_keepalive_time_ms
              value: "10000"
            - name: RAY_grpc_client_keepalive_timeout_ms
              value: "20000"
            - name: RAY_CLIENT_RECONNECT_GRACE_PERIOD
              value: "120"
            - name: GRPC_KEEPALIVE_PERMIT_WITHOUT_CALLS
              value: "1"
          livenessProbe:
            exec:
              command: ["sh", "-c", "[ -n \"$(find /tmp/optimizer-heartbeat -mmin -30)\" ]"]
            initialDelaySeconds: 300
            periodSeconds: 120
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config.py
              subPath: config.py
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: data
              mountPath: /app/.yfinance_cache
              subPath: .yfinance_cache
            - name: data
              mountPath: /app/logs
              subPath: logs/optimizer
          resources:
            requests:
              memory: "2560Mi"
              cpu: "500m"
            limits:
              memory: "5Gi"
              cpu: "1000m"
      volumes:
        - name: config
          secret:
            secretName: robinhoodbot-config
        - name: data
          persistentVolumeClaim:
            claimName: robinhoodbot-data-longhorn
