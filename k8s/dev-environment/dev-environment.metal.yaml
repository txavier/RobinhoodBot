apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-sandbox-robinhoodbot
  namespace: robinhoodbot-dev
  labels:
    app: robinhoodbot
    component: dev-sandbox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: robinhoodbot
      component: dev-sandbox
  template:
    metadata:
      labels:
        app: robinhoodbot
        component: dev-sandbox
    spec:
      initContainers:
        - name: seed-home
          image: 192.168.87.35:5000/robinhoodbot-dev-sandbox:latest
          command: ["sh", "-c", "if [ -z \"$(ls -A /home-data)\" ]; then cp -a /home/agent/. /home-data/; fi"]
          volumeMounts:
            - name: home-data
              mountPath: /home-data
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "mkdir -p /settings/vscode-server /settings/github-copilot /settings/claude && chown -R 1000:1000 /workspace /home-data /settings"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: home-data
              mountPath: /home-data
            - name: dev-settings
              mountPath: /settings
      containers:
        - name: claude-code-sandbox
          image: 192.168.87.35:5000/robinhoodbot-dev-sandbox:latest
          command: ["sleep", "infinity"]
          stdin: true
          tty: true
          env:
            - name: TZ
              value: "America/New_York"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: home-data
              mountPath: /home/agent
            # VS Code Server (settings, extensions, keybindings)
            - name: dev-settings
              mountPath: /home/agent/.vscode-server
              subPath: vscode-server
            # GitHub Copilot settings and memory
            - name: dev-settings
              mountPath: /home/agent/.config/github-copilot
              subPath: github-copilot
            # Claude Code settings and memory
            - name: dev-settings
              mountPath: /home/agent/.claude
              subPath: claude
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "7"
              memory: "15Gi"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: dev-git-data-pvc
        - name: home-data
          persistentVolumeClaim:
            claimName: dev-home-data-pvc
        - name: dev-settings
          persistentVolumeClaim:
            claimName: dev-settings-pvc
