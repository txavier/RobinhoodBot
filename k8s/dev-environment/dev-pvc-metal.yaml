apiVersion: v1
kind: Namespace
metadata:
  name: robinhoodbot-dev
  labels:
    app: robinhoodbot
    environment: development
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-git-data-pvc
  namespace: robinhoodbot-dev
  labels:
    app: robinhoodbot
    component: dev-sandbox
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-home-data-pvc
  namespace: robinhoodbot-dev
  labels:
    app: robinhoodbot
    component: dev-sandbox
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-settings-pvc
  namespace: robinhoodbot-dev
  labels:
    app: robinhoodbot
    component: dev-sandbox
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
