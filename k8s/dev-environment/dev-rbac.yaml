# RBAC for the dev-sandbox pod.
# Grants cluster-wide read access (nodes, namespaces, PVs, etc.)
# and read/write access to the robinhoodbot and robinhoodbot-dev namespaces.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-sandbox
  namespace: robinhoodbot-dev
  labels:
    app: robinhoodbot
    component: dev-sandbox
---
# Custom ClusterRole for cluster-scoped read access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dev-sandbox-cluster-read
  labels:
    app: robinhoodbot
    component: dev-sandbox
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["longhorn.io"]
    resources: ["nodes", "volumes", "replicas"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dev-sandbox-cluster-read
  labels:
    app: robinhoodbot
    component: dev-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dev-sandbox-cluster-read
subjects:
  - kind: ServiceAccount
    name: dev-sandbox
    namespace: robinhoodbot-dev
---
# Read/write access to the robinhoodbot namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-sandbox-edit
  namespace: robinhoodbot
  labels:
    app: robinhoodbot
    component: dev-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: dev-sandbox
    namespace: robinhoodbot-dev
---
# Read/write access to the robinhoodbot-dev namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-sandbox-edit
  namespace: robinhoodbot-dev
  labels:
    app: robinhoodbot
    component: dev-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: dev-sandbox
    namespace: robinhoodbot-dev
---
# Read/write access to the fingerprint-dev namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-sandbox-edit
  namespace: fingerprint-dev
  labels:
    app: robinhoodbot
    component: dev-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: dev-sandbox
    namespace: robinhoodbot-dev
---
# Read/write access to the longhorn-system namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-sandbox-edit
  namespace: longhorn-system
  labels:
    app: robinhoodbot
    component: dev-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: dev-sandbox
    namespace: robinhoodbot-dev
---
# Read/write access to the default namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-sandbox-edit
  namespace: default
  labels:
    app: robinhoodbot
    component: dev-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: dev-sandbox
    namespace: robinhoodbot-dev
