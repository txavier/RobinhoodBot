# ============================================================================
# Longhorn StorageClass — hardened for WiFi bare-metal cluster
# ============================================================================
# StorageClass parameters are IMMUTABLE. To update, delete and recreate:
#   kubectl delete storageclass longhorn
#   kubectl apply -f k8s/longhorn-storageclass.yaml
#
# Existing PVCs/PVs are unaffected — only new PVCs pick up changes.
# To update existing volumes, use the Longhorn UI or API.
allowVolumeExpansion: true
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: ext4
  dataLocality: best-effort
  unmapMarkSnapChainRemoved: ignored
  disableRevisionCounter: "false"
  dataEngine: v1
  backupTargetName: default
