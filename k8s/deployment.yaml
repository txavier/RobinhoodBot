apiVersion: apps/v1
kind: Deployment
metadata:
  name: robinhoodbot
  namespace: robinhoodbot
  labels:
    app: robinhoodbot
spec:
  replicas: 1  # IMPORTANT: Never run more than 1 replica — duplicate trades!
  strategy:
    type: Recreate  # Don't run two pods simultaneously during updates
  selector:
    matchLabels:
      app: robinhoodbot
  template:
    metadata:
      labels:
        app: robinhoodbot
    spec:
      priorityClassName: robinhoodbot-critical
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
      containers:
        - name: bot
          image: 192.168.87.35:5000/robinhoodbot:latest
          imagePullPolicy: Always
          env:
            - name: TZ
              value: "America/New_York"
            - name: DATA_DIR
              value: "/app/data"
            - name: RH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: robinhoodbot-secrets
                  key: rh-password
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config.py
              subPath: config.py
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: data
              mountPath: /root/.tokens
              subPath: .tokens
            - name: data
              mountPath: /app/logs
              subPath: logs/robinhoodbot
          livenessProbe:
            exec:
              command: ["find", "/tmp/heartbeat", "-mmin", "-12"]
            initialDelaySeconds: 60
            periodSeconds: 120
            failureThreshold: 3
          resources:
            requests:
              memory: "1Gi"
              cpu: "100m"
            limits:
              memory: "2.5Gi"
              cpu: "500m"
      volumes:
        - name: config
          secret:
            secretName: robinhoodbot-config
        - name: data
          persistentVolumeClaim:
            claimName: robinhoodbot-data-nfs
