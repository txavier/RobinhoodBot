apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: registry-config
  namespace: kube-system
  labels:
    app: registry-config
spec:
  selector:
    matchLabels:
      app: registry-config
  template:
    metadata:
      labels:
        app: registry-config
    spec:
      hostPID: true
      initContainers:
        - name: configure-containerd
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              # For containerd 1.x (workers): add mirror config to config.toml
              CONFIG="/host/etc/containerd/config.toml"
              MARKER="# LOCAL_REGISTRY_CONFIGURED"

              if [ -f "$CONFIG" ] && ! grep -q "$MARKER" "$CONFIG"; then
                echo "$MARKER" >> "$CONFIG"
                # Add insecure registry mirror for the control-plane registry
                cat >> "$CONFIG" << 'TOML'

              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."192.168.87.35:5000"]
                endpoint = ["http://192.168.87.35:5000"]
              [plugins."io.containerd.grpc.v1.cri".registry.configs."192.168.87.35:5000".tls]
                insecure_skip_verify = true
              TOML
                echo "Configured containerd for local registry"
                # Restart containerd via nsenter into host PID namespace
                nsenter -t 1 -m -u -i -n -- systemctl restart containerd
                echo "Restarted containerd"
              else
                echo "Already configured or config not found"
              fi

              # For containerd 2.x (control plane): use hosts directory
              HOSTS_DIR="/host/etc/containerd/certs.d/192.168.87.35:5000"
              if [ ! -d "$HOSTS_DIR" ]; then
                mkdir -p "$HOSTS_DIR"
                cat > "$HOSTS_DIR/hosts.toml" << 'TOML'
              server = "http://192.168.87.35:5000"

              [host."http://192.168.87.35:5000"]
                capabilities = ["pull", "resolve"]
                skip_verify = true
              TOML
                echo "Configured containerd 2.x hosts directory"
              fi
          volumeMounts:
            - name: etc-containerd
              mountPath: /host/etc/containerd
      containers:
        # DaemonSet requires at least one container; this one just sleeps
        - name: pause
          image: busybox:1.36
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "1m"
              memory: "4Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
      tolerations:
        # Run on control-plane nodes too
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: etc-containerd
          hostPath:
            path: /etc/containerd
            type: Directory
