# ============================================================================
# DaemonSet to install nfs-common on all nodes
# ============================================================================
# Runs a privileged init container that installs nfs-common via the host's
# package manager, then sleeps. This ensures all nodes can mount NFS volumes.
# Can be deleted after nfs-common is confirmed installed on all nodes.
# ============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: install-nfs-common
  namespace: kube-system
  labels:
    app: install-nfs-common
spec:
  selector:
    matchLabels:
      app: install-nfs-common
  template:
    metadata:
      labels:
        app: install-nfs-common
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists   # Run on ALL nodes including control-plane
      initContainers:
        - name: install
          image: ubuntu:24.04
          securityContext:
            privileged: true
          command:
            - nsenter
            - "--target"
            - "1"
            - "--mount"
            - "--uts"
            - "--ipc"
            - "--net"
            - "--pid"
            - "--"
            - bash
            - "-c"
            - |
              if ! dpkg -l nfs-common 2>/dev/null | grep -q ^ii; then
                apt-get update -qq && apt-get install -y nfs-common
              else
                echo "nfs-common already installed"
              fi
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
